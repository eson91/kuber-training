apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-recreate
spec:
  strategy:
    type: Recreate
  replicas: 4
  selector:
    matchLabels:
     app: linux
  template:
    metadata:
      labels:
        app: linux
    spec:
      containers:
      - name: test
        image: quay.io/shruti1988/production:v1
        imagePullPolicy: IfNotPresent
